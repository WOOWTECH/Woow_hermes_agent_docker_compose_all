# =============================================================
# Hermes - Network Policies
# Restrict database/cache access to hermes pods only
# =============================================================

# PostgreSQL: only hermes-agent and hermes-webui can connect
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: __NAMESPACE__-postgresql-policy
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/part-of: hermes
spec:
  podSelector:
    matchLabels:
      app: hermes-postgresql
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: hermes-agent
        - podSelector:
            matchLabels:
              app: hermes-webui
      ports:
        - protocol: TCP
          port: 5432
---
# Redis: only hermes-agent and hermes-webui can connect
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: __NAMESPACE__-redis-policy
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/part-of: hermes
spec:
  podSelector:
    matchLabels:
      app: hermes-redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: hermes-agent
        - podSelector:
            matchLabels:
              app: hermes-webui
      ports:
        - protocol: TCP
          port: 6379
