# =============================================================
# Hermes - ConfigMaps (non-secret configuration)
# =============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: cf-config
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/part-of: hermes
data:
  CF_ACCOUNT_ID: "__CF_ACCOUNT_ID__"
  CF_TUNNEL_ID: "__CF_TUNNEL_ID__"
  DOMAIN: "__DOMAIN__"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/part-of: hermes
data:
  # Domain
  HERMES_DOMAIN: "__DOMAIN__"
  HERMES_BASE_URL: "https://__DOMAIN__"
  # WebUI
  HERMES_WEBUI_PORT: "8787"
  # Agent
  HERMES_AGENT_PORT: "8642"
  # Database
  POSTGRES_HOST: "hermes-postgresql-svc"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "hermes"
  POSTGRES_USER: "hermes"
  # Redis
  REDIS_HOST: "hermes-redis-svc"
  REDIS_PORT: "6379"
  # User
  WANTED_UID: "1000"
