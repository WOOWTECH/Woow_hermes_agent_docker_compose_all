# =============================================================
# Hermes - Redis 7 Deployment + Service
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-redis
  namespace: __NAMESPACE__
  labels:
    app: hermes-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: hermes
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hermes-redis
  template:
    metadata:
      labels:
        app: hermes-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory
            - "256mb"
            - --maxmemory-policy
            - "allkeys-lru"
          volumeMounts:
            - name: redis-data
              mountPath: /data
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 300Mi
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: hermes-redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: hermes-redis-svc
  namespace: __NAMESPACE__
  labels:
    app: hermes-redis
    app.kubernetes.io/part-of: hermes
spec:
  selector:
    app: hermes-redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
      name: redis
  type: ClusterIP
