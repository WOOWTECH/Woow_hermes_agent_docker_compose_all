# =============================================================
# Hermes - PersistentVolumeClaims
# =============================================================

# --- PostgreSQL Data (10Gi) ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-postgresql-pvc
  namespace: __NAMESPACE__
  labels:
    app: hermes-postgresql
    app.kubernetes.io/part-of: hermes
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
# --- Redis Data (5Gi) ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-redis-pvc
  namespace: __NAMESPACE__
  labels:
    app: hermes-redis
    app.kubernetes.io/part-of: hermes
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
# --- Hermes Shared Home (~/.hermes) (10Gi) ---
# Shared between hermes-agent and hermes-webui
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-home-pvc
  namespace: __NAMESPACE__
  labels:
    app: hermes
    app.kubernetes.io/part-of: hermes
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
# --- Hermes Agent Source (/opt/hermes) (5Gi) ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-agent-src-pvc
  namespace: __NAMESPACE__
  labels:
    app: hermes-agent
    app.kubernetes.io/part-of: hermes
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
