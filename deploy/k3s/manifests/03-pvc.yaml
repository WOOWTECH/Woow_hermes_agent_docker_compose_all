# =============================================================
# Hermes - PersistentVolumeClaims
# =============================================================

# --- PostgreSQL Data (10Gi, local-path) ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-postgresql-pvc
  namespace: __NAMESPACE__
  labels:
    app: hermes-postgresql
    app.kubernetes.io/part-of: hermes
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
# --- Redis Data (5Gi, local-path) ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-redis-pvc
  namespace: __NAMESPACE__
  labels:
    app: hermes-redis
    app.kubernetes.io/part-of: hermes
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
# --- Hermes WebUI Data (5Gi, longhorn) ---
# Shared volume for the combined hermes sidecar pod
# Mounted at /opt/data (agent) and /home/hermeswebui/.hermes (webui)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-webui-data
  namespace: __NAMESPACE__
  labels:
    app: hermes
    app.kubernetes.io/part-of: hermes
spec:
  storageClassName: longhorn
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
