# =============================================================
# Hermes - Ingress (for internal cluster routing)
# External access is via Cloudflare Tunnel → hermes-webui-svc:8787
#
# This Ingress is optional — useful if you also want
# direct cluster-level routing via ingress-nginx or Traefik.
# =============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hermes-ingress
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/part-of: hermes
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
    - host: __DOMAIN__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hermes-webui-svc
                port:
                  number: 8787
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: hermes-agent-svc
                port:
                  number: 8642
