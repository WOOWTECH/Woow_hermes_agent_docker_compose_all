# =============================================================
# Hermes Terminal (ttyd) — Browser-based TUI for hermes-agent
#
# Architecture: Browser → Cloudflare Tunnel → ttyd(:7681)
#   → connect.sh → kubectl exec → hermes-agent bash
#
# Replicates VK ttyd pattern (vibe-kanban/11-terminal.yaml)
# =============================================================

# 1. ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hermes-terminal-sa
  namespace: hermes
---
# 2. Role (minimum: pods/get,list + pods/exec)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hermes-terminal-role
  namespace: hermes
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
---
# 3. RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hermes-terminal-rb
  namespace: hermes
subjects:
  - kind: ServiceAccount
    name: hermes-terminal-sa
    namespace: hermes
roleRef:
  kind: Role
  name: hermes-terminal-role
  apiGroup: rbac.authorization.k8s.io
---
# 4. ConfigMap (connect.sh + startup.sh)
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-terminal-scripts
  namespace: hermes
data:
  connect.sh: |
    #!/bin/sh
    NAMESPACE="hermes"
    LABEL="app=hermes"
    CONTAINER="hermes-agent"
    while true; do
      POD=$(kubectl get pod -l "$LABEL" -n "$NAMESPACE" \
        --field-selector=status.phase=Running \
        -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
      if [ -n "$POD" ]; then
        echo "Connecting to $POD ($CONTAINER)..."
        kubectl exec -it "$POD" -n "$NAMESPACE" -c "$CONTAINER" -- /bin/bash
        echo ""
        echo "Session ended. Reconnecting in 2s..."
        sleep 2
      else
        echo "Waiting for hermes-agent pod..."
        sleep 5
      fi
    done
  startup.sh: |
    #!/bin/bash
    if [ ! -f /usr/local/bin/ttyd ]; then
      apt-get update && apt-get install -y --no-install-recommends curl ca-certificates && rm -rf /var/lib/apt/lists/*
      curl -sLo /usr/local/bin/ttyd https://github.com/tsl0922/ttyd/releases/download/1.7.7/ttyd.x86_64
      chmod +x /usr/local/bin/ttyd
      curl -sLo /usr/local/bin/kubectl "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
      chmod +x /usr/local/bin/kubectl
    fi
    echo "Starting ttyd on :7681..."
    exec ttyd -p 7681 -c "admin:${TUI_PASSWORD}" -W /scripts/connect.sh
---
# 5. Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-terminal
  namespace: hermes
  labels:
    app: hermes-terminal
    app.kubernetes.io/component: terminal
    app.kubernetes.io/part-of: hermes
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hermes-terminal
  template:
    metadata:
      labels:
        app: hermes-terminal
    spec:
      serviceAccountName: hermes-terminal-sa
      containers:
        - name: ttyd
          image: ubuntu:24.04
          command: ["bash", "/scripts/startup.sh"]
          ports:
            - containerPort: 7681
              name: ttyd
          env:
            - name: TUI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: WEBUI_PASSWORD
                  optional: true
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 7681
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 7681
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: scripts
          configMap:
            name: hermes-terminal-scripts
            defaultMode: 0755
---
# 6. Service
apiVersion: v1
kind: Service
metadata:
  name: hermes-terminal-svc
  namespace: hermes
  labels:
    app: hermes-terminal
    app.kubernetes.io/part-of: hermes
spec:
  selector:
    app: hermes-terminal
  ports:
    - name: ttyd
      protocol: TCP
      port: 7681
      targetPort: 7681
  type: ClusterIP
