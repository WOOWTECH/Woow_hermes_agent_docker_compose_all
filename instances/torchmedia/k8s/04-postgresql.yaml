# =============================================================
# Hermes - PostgreSQL 15 Deployment + Service
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-postgresql
  namespace: torchmedia-hermes
  labels:
    app: hermes-postgresql
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: hermes
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hermes-postgresql
  template:
    metadata:
      labels:
        app: hermes-postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:15
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: hermes-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: hermes-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - hermes
                - -d
                - hermes
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - hermes
                - -d
                - hermes
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: hermes-postgresql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: hermes-postgresql-svc
  namespace: torchmedia-hermes
  labels:
    app: hermes-postgresql
    app.kubernetes.io/part-of: hermes
spec:
  selector:
    app: hermes-postgresql
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
      name: postgres
  type: ClusterIP
