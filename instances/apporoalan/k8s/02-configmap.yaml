# =============================================================
# Hermes - ConfigMaps (non-secret configuration)
# =============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: cf-config
  namespace: apporoalan-hermes
  labels:
    app.kubernetes.io/part-of: hermes
data:
  CF_ACCOUNT_ID: "REDACTED_CF_ACCOUNT_ID"
  CF_TUNNEL_ID: "REDACTED_CF_TUNNEL_ID"
  DOMAIN: "apporoalan-hermes.woowtech.io"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config
  namespace: apporoalan-hermes
  labels:
    app.kubernetes.io/part-of: hermes
data:
  # Domain
  HERMES_DOMAIN: "apporoalan-hermes.woowtech.io"
  HERMES_BASE_URL: "https://apporoalan-hermes.woowtech.io"
  # WebUI
  HERMES_WEBUI_PORT: "8787"
  # Agent
  HERMES_AGENT_PORT: "8642"
  # Database
  POSTGRES_HOST: "hermes-postgresql-svc"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "hermes"
  POSTGRES_USER: "hermes"
  # Redis
  REDIS_HOST: "hermes-redis-svc"
  REDIS_PORT: "6379"
  # User
  WANTED_UID: "1000"
