# =============================================================
# Hermes Agent - RBAC for kubectl access
# Cluster-wide read + hermes namespace limited write
# =============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hermes-agent-sa
  namespace: alanlin-hermes
  labels:
    app: hermes-agent
    app.kubernetes.io/part-of: hermes
---
# Cluster-wide read-only
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: alanlin-hermes-agent-cluster-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "namespaces", "nodes",
                "configmaps", "persistentvolumeclaims", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alanlin-hermes-agent-cluster-reader-binding
subjects:
  - kind: ServiceAccount
    name: hermes-agent-sa
    namespace: alanlin-hermes
roleRef:
  kind: ClusterRole
  name: alanlin-hermes-agent-cluster-reader
  apiGroup: rbac.authorization.k8s.io
---
# Hermes namespace limited write
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hermes-agent-ns-writer
  namespace: alanlin-hermes
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hermes-agent-ns-writer-binding
  namespace: alanlin-hermes
subjects:
  - kind: ServiceAccount
    name: hermes-agent-sa
    namespace: alanlin-hermes
roleRef:
  kind: Role
  name: hermes-agent-ns-writer
  apiGroup: rbac.authorization.k8s.io
