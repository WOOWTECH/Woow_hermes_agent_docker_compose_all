# =============================================================
# Hermes Agent - Main AI Assistant Service (Custom Image)
# Image: localhost/hermes-agent-custom:latest
# Port:  8642 (gateway), 9119 (dashboard)
# Command: gateway run (headless server mode)
# Data dir: /opt/data
# Includes: 26+ CLI tools baked into image (no postStart needed)
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-agent
  namespace: alanlin-hermes
  labels:
    app: hermes-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: hermes
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hermes-agent
  template:
    metadata:
      labels:
        app: hermes-agent
    spec:
      serviceAccountName: hermes-agent-sa
      containers:
        - name: hermes-agent
          image: __REGISTRY_HOST__:5000/hermes-agent-custom:latest
          imagePullPolicy: Never
          args:
            - gateway
            - run
          ports:
            - containerPort: 8642
              name: gateway
            - containerPort: 9119
              name: dashboard
          env:
            # Enable dashboard
            - name: HERMES_DASHBOARD
              value: "1"
            # Enable in-browser Chat tab (embedded terminal via PTY/WebSocket)
            - name: HERMES_DASHBOARD_TUI
              value: "1"
            # Required when binding to 0.0.0.0 without OAuth auth gate
            - name: HERMES_DASHBOARD_INSECURE
              value: "1"
            # API server for OpenAI-compatible endpoint
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: API_SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: API_SERVER_KEY
            - name: API_SERVER_CORS_ORIGINS
              value: "*"
            # Allow all users (no allowlist filtering)
            - name: GATEWAY_ALLOW_ALL_USERS
              value: "true"
            # Ensure all CLI tools are in PATH for terminal tool
            - name: PATH
              value: "/opt/data/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/opt/google-cloud-sdk/bin"
            # LLM
            - name: MINIMAX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: MINIMAX_API_KEY
          # NOTE: postStart hook REMOVED — all tools baked into custom image
          volumeMounts:
            - name: hermes-data
              mountPath: /opt/data
          readinessProbe:
            tcpSocket:
              port: 8642
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 8642
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 6Gi
      volumes:
        - name: hermes-data
          persistentVolumeClaim:
            claimName: hermes-home-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: hermes-agent-svc
  namespace: alanlin-hermes
  labels:
    app: hermes-agent
    app.kubernetes.io/part-of: hermes
spec:
  selector:
    app: hermes-agent
  ports:
    - protocol: TCP
      port: 8642
      targetPort: 8642
      name: gateway
    - protocol: TCP
      port: 9119
      targetPort: 9119
      name: dashboard
  type: ClusterIP
