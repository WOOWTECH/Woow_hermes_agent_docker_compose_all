# =============================================================
# Hermes - Secrets (TEMPLATE — deploy.sh generates real values)
# DO NOT commit real base64-encoded secrets to version control
# =============================================================
apiVersion: v1
kind: Secret
metadata:
  name: cf-secrets
  namespace: hermes
  labels:
    app.kubernetes.io/part-of: hermes
type: Opaque
data:
  CF_API_TOKEN: "PLACEHOLDER_CF_API_TOKEN_BASE64"
  CF_TUNNEL_TOKEN: "PLACEHOLDER_CF_TUNNEL_TOKEN_BASE64"
---
apiVersion: v1
kind: Secret
metadata:
  name: hermes-secrets
  namespace: hermes
  labels:
    app.kubernetes.io/part-of: hermes
type: Opaque
data:
  # Required
  POSTGRES_PASSWORD: "PLACEHOLDER_POSTGRES_PASSWORD_BASE64"
  # LLM Provider — Minimax
  MINIMAX_API_KEY: "PLACEHOLDER_MINIMAX_API_KEY_BASE64"
