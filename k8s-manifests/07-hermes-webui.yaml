# =============================================================
# Hermes WebUI - Web Interface
# Image: ghcr.io/nesquena/hermes-webui:latest
# Port:  8787
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-webui
  namespace: hermes
  labels:
    app: hermes-webui
    app.kubernetes.io/component: webui
    app.kubernetes.io/part-of: hermes
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hermes-webui
  template:
    metadata:
      labels:
        app: hermes-webui
    spec:
      serviceAccountName: hermes-agent-sa
      initContainers:
        # 1) Clone hermes-agent source from GitHub (lightweight)
        - name: clone-agent-src
          image: alpine/git:latest
          command: ['sh', '-c']
          args:
            - |
              git clone --depth 1 https://github.com/NousResearch/hermes-agent.git /agent-src
              chown -R 1000:1000 /agent-src
          volumeMounts:
            - name: agent-src
              mountPath: /agent-src
        # 2) Write .env, config.yaml, and .profile into hermes-home
        - name: init-config
          image: busybox
          command: ['sh', '-c']
          args:
            - |
              printf 'MINIMAX_API_KEY=%s\n' "$MINIMAX_API_KEY" > /data/.env
              printf 'model:\n  default: "minimax/MiniMax-M2.7"\n  provider: "minimax"\n' > /data/config.yaml
              mkdir -p /data/home
              printf 'export PATH="/opt/tools:/opt/google-cloud-sdk/bin:${PATH}"\n' > /data/home/.profile
              cp /data/home/.profile /data/home/.bashrc
              chown -R 1000:1000 /data
          env:
            - name: MINIMAX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: MINIMAX_API_KEY
          volumeMounts:
            - name: hermes-home
              mountPath: /data
        # 3) Download static binary tools into /opt/tools volume
        - name: install-tools
          image: docker.io/library/alpine:latest
          command: ['sh', '-c']
          args:
            - |
              apk add --no-cache curl tar
              mkdir -p /opt/tools
              KUBECTL_V=v1.34.3
              curl -fsSL "https://dl.k8s.io/release/${KUBECTL_V}/bin/linux/amd64/kubectl" -o /opt/tools/kubectl
              curl -fsSL "https://github.com/mikefarah/yq/releases/download/v4.44.6/yq_linux_amd64" -o /opt/tools/yq
              curl -fsSL "https://get.helm.sh/helm-v3.17.3-linux-amd64.tar.gz" | tar xz -C /tmp && cp /tmp/linux-amd64/helm /opt/tools/
              curl -fsSL "https://github.com/argoproj/argo-cd/releases/download/v2.14.12/argocd-linux-amd64" -o /opt/tools/argocd
              curl -fsSL "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64" -o /opt/tools/cloudflared
              curl -fsSL "https://github.com/cli/cli/releases/download/v2.73.0/gh_2.73.0_linux_amd64.tar.gz" | tar xz -C /tmp && cp /tmp/gh_2.73.0_linux_amd64/bin/gh /opt/tools/
              chmod +x /opt/tools/*
              echo "Static binaries: $(ls /opt/tools | wc -l)"
          volumeMounts:
            - name: tools
              mountPath: /opt/tools
      containers:
        - name: hermes-webui
          image: ghcr.io/nesquena/hermes-webui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8787
              name: http
          env:
            - name: HERMES_WEBUI_HOST
              value: "0.0.0.0"
            - name: HERMES_WEBUI_PORT
              value: "8787"
            - name: HERMES_WEBUI_STATE_DIR
              value: "/home/hermeswebui/.hermes/webui"
            - name: HERMES_HOME
              value: "/home/hermeswebui/.hermes"
            - name: PATH
              value: "/opt/tools:/home/hermeswebui/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            - name: WANTED_UID
              valueFrom:
                configMapKeyRef:
                  name: hermes-config
                  key: WANTED_UID
            - name: WANTED_GID
              valueFrom:
                configMapKeyRef:
                  name: hermes-config
                  key: WANTED_UID
            # Connect to hermes-agent gateway
            - name: GATEWAY_HEALTH_URL
              value: "http://hermes-agent-svc:8642"
            # LLM - Minimax
            - name: MINIMAX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: MINIMAX_API_KEY
            # Security
            - name: HERMES_WEBUI_PASSWORD
              value: "woowtech"
          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    (
                      apt-get update -qq && \
                      apt-get install -y -qq --no-install-recommends \
                        jq fd-find rsync postgresql-client redis-tools \
                        dnsutils iputils-ping nmap netcat-openbsd traceroute \
                        lynx imagemagick pandoc git-lfs mosh httpie && \
                      ln -sf /usr/bin/fdfind /usr/local/bin/fd
                    ) > /tmp/tools-install.log 2>&1 &
          tty: true
          volumeMounts:
            - name: hermes-home
              mountPath: /home/hermeswebui/.hermes
            - name: agent-src
              mountPath: /home/hermeswebui/.hermes/hermes-agent
            - name: tools
              mountPath: /opt/tools
          readinessProbe:
            tcpSocket:
              port: 8787
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            tcpSocket:
              port: 8787
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
          resources:
            requests:
              cpu: 1000m
              memory: 512Mi
            limits:
              cpu: 4000m
              memory: 2Gi
      volumes:
        - name: hermes-home
          emptyDir: {}
        - name: agent-src
          emptyDir: {}
        - name: tools
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: hermes-webui-svc
  namespace: hermes
  labels:
    app: hermes-webui
    app.kubernetes.io/part-of: hermes
spec:
  selector:
    app: hermes-webui
  ports:
    - protocol: TCP
      port: 8787
      targetPort: 8787
      name: http
  type: ClusterIP
