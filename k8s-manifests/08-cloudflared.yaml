# =============================================================
# Hermes - Cloudflare Tunnel (cloudflared)
# Provides external access via https://hermes-woowtechmag.woowtech.io
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: hermes
  labels:
    app: cloudflared
    app.kubernetes.io/component: tunnel
    app.kubernetes.io/part-of: hermes
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      terminationGracePeriodSeconds: 30
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args:
            - tunnel
            - run
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cf-secrets
                  key: CF_TUNNEL_TOKEN
          livenessProbe:
            httpGet:
              path: /ready
              port: 20241
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 20241
            initialDelaySeconds: 10
            periodSeconds: 30
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      restartPolicy: Always
